<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Model Viewer</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #eeeeee;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #eeeeee;
    }
  </style>
</head>

<body>
  <model-viewer
    src="./model.glb"
    ios-src="./model.usdz"
    ar
    ar-modes="quick-look scene-viewer webxr"
    camera-controls
    shadow-intensity="1">

    <button slot="ar-button" style="
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      font-size: 16px;">
      View in AR
    </button>

  </model-viewer>
</body>
</html>
