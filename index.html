<!DOCTYPE html>
<html>
  <head>
    <title>AR Model Viewer</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
      body {
        margin: 0;
      }
      model-viewer {
        width: 100vw;
        height: 100vh;
        background: #eeeeee;
      }
    </style>
  </head>

  <body>
    <model-viewer
      src="Quarry Model  middle section.glb"
      ar
      ar-modes="webxr scene-viewer"
      camera-controls
      auto-rotate
      shadow-intensity="1">
    </model-viewer>
  </body>
</html>
